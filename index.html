<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Mode</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            animation: float 2s infinite ease-in-out;
            padding: 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        p {
            font-size: 20px;
            opacity: 0.9;
            line-height: 1.5;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        <noscript>
            <style>
                .no-js body {
                    display: none;
                }
            </style>
            <meta http-equiv="refresh" content="0;url=https://muhammadadi-il.github.io/no-script-warning/">
        </noscript>
    </style>

</head>

<body>

<div class="container">
    <h1>🚧 Under Maintenance</h1>
    <p>Our website is being updated to serve you better.<br>
        Please check back shortly.</p>
</div>

</body>
</html>
